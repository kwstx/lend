apiVersion: apps/v1
kind: Deployment
metadata:
  name: lend-api
  labels:
    app: lend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lend
  template:
    metadata:
      labels:
        app: lend
    spec:
      containers:
      - name: api
        image: ${IMAGE_NAME}
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: lend-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lend-service
spec:
  selector:
    app: lend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
