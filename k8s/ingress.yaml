apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lend-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: lend.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lend-service
            port:
              number: 80
  tls:
  - hosts:
    - lend.yourdomain.com
    secretName: lend-tls-secret
